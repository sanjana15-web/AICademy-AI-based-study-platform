<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auth - Study Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      display: flex;
      gap: 40px;
      background:
        radial-gradient(circle at top left, rgba(129,140,248,.18), rgba(15,23,42,1)),
        radial-gradient(circle at bottom right, rgba(56,189,248,.12), rgba(2,6,23,1));
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 820px;
      width: 100%;
      border: 1px solid rgba(99,102,241,0.6);
      box-shadow:
        0 25px 70px rgba(15,23,42,1),
        0 0 25px rgba(99,102,241,.4);
      position: relative;
      overflow: hidden;
    }

    .auth-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(129,140,248,.25), transparent 60%);
      opacity: .55;
      pointer-events: none;
    }

    .auth-left,
    .auth-right {
      position: relative;
      z-index: 1;
      flex: 1;
      min-width: 0;
    }

    .auth-left {
      border-right: 1px solid rgba(148,163,184,.3);
      padding-right: 24px;
    }

    .auth-right {
      padding-left: 24px;
    }

    .heading {
      font-size: 1.7rem;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    .sub {
      font-size: .85rem;
      color: #9ca3af;
      margin-bottom: 22px;
    }

    form {
      margin-top: 8px;
    }

    label {
      font-size: .8rem;
      color: #9ca3af;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 10px 11px;
      margin-bottom: 14px;
      border-radius: 12px;
      border: 1px solid rgba(55,65,81,.7);
      background: rgba(15,23,42,.95);
      color: #e5e7eb;
      font-size: .88rem;
      transition: .22s;
    }

    input::placeholder {
      color: #6b7280;
    }

    input:focus {
      outline: none;
      border-color: rgba(129,140,248,.95);
      box-shadow: 0 0 12px rgba(99,102,241,.7);
      transform: scale(1.015);
    }

    .btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow:
        0 18px 40px rgba(79,70,229,.8),
        0 0 14px rgba(56,189,248,.6);
      transition: .22s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 22px 50px rgba(79,70,229,1),
        0 0 18px rgba(56,189,248,.9);
    }

    .link-text {
      margin-top: 10px;
      font-size: .8rem;
      color: #9ca3af;
    }

    .link-text span {
      color: #a5b4fc;
      cursor: pointer;
      text-decoration: underline;
    }

    .error {
      font-size: .78rem;
      color: #fca5a5;
      margin-bottom: 8px;
      min-height: 16px;
    }

    .success {
      font-size: .78rem;
      color: #bbf7d0;
      margin-bottom: 8px;
      min-height: 16px;
    }

    @media (max-width: 720px) {
      .auth-container {
        flex-direction: column;
        padding: 24px 18px;
      }
      .auth-left {
        border-right: none;
        border-bottom: 1px solid rgba(148,163,184,.3);
        padding-right: 0;
        padding-bottom: 18px;
        margin-bottom: 10px;
      }
      .auth-right {
        padding-left: 0;
      }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <!-- SIGN UP (New User) -->
  <div class="auth-left">
    <h2 class="heading">Sign Up</h2>
    <p class="sub">Create a new account to access your AI Study Dashboard.</p>

    <div id="signupMsg" class="error"></div>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <label for="suEmail">Email</label>
      <input type="email" id="suEmail" placeholder="Enter your email" required />

      <label for="suPassword">Password</label>
      <input type="password" id="suPassword" placeholder="Create a password (min 6 chars)" required />

      <label for="suConfirm">Confirm Password</label>
      <input type="password" id="suConfirm" placeholder="Re-enter your password" required />

      <button type="submit" class="btn">Sign Up</button>
    </form>

    <p class="link-text">
      Already have an account?
      <span onclick="scrollToLogin()">Login here</span>
    </p>
  </div>

  <!-- LOGIN (Existing User) -->
  <div class="auth-right">
    <h2 class="heading">Login</h2>
    <p class="sub">Welcome back! Enter your credentials to continue.</p>

    <div id="loginMsg" class="error"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <label for="liEmail">Email</label>
      <input type="email" id="liEmail" placeholder="Registered email" required />

      <label for="liPassword">Password</label>
      <input type="password" id="liPassword" placeholder="Your password" required />

      <button type="submit" class="btn">Login</button>
    </form>

    <p class="link-text">
      New user?
      <span onclick="scrollToSignup()">Create an account</span>
    </p>
  </div>
</div>

<script>
  // ===== CONFIG: target pages (YOUR PATHS) =====
// ✅ RIGHT (relative URLs for browser)
        const DASHBOARD_PATH = "Dashboard/dashboard.html";
        const INDEX_PATH     = "index.html";


  // ===== Helper: get & save users in localStorage =====
  function getUsers() {
    const data = localStorage.getItem("users");
    return data ? JSON.parse(data) : [];
  }

  function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
  }

  // ===== Helper: set logged in user =====
  function setLoggedIn(email) {
    localStorage.setItem("loggedIn", "true");
    localStorage.setItem("loggedInEmail", email);
  }

  // ===== On load: if already logged in, you may redirect directly to dashboard (optional) =====
  (function () {
    const alreadyLoggedIn = localStorage.getItem("loggedIn") === "true";
    if (alreadyLoggedIn) {
      // If you want auth page to auto-skip for logged users, uncomment:
      // window.location.href = DASHBOARD_PATH;
    }
  })();

  // ===== SIGNUP =====
  function handleSignup(event) {
    event.preventDefault();

    const email    = document.getElementById("suEmail").value.trim();
    const password = document.getElementById("suPassword").value.trim();
    const confirm  = document.getElementById("suConfirm").value.trim();
    const msgBox   = document.getElementById("signupMsg");

    msgBox.className = "error";
    msgBox.textContent = "";

    // Basic validation
    if (!email || !password || !confirm) {
      msgBox.textContent = "Please fill all fields.";
      return;
    }

    // Email pattern
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
    if (!emailPattern.test(email)) {
      msgBox.textContent = "Enter a valid email address.";
      return;
    }

    if (password.length < 6) {
      msgBox.textContent = "Password must be at least 6 characters.";
      return;
    }

    if (password !== confirm) {
      msgBox.textContent = "Password and Confirm Password do not match.";
      return;
    }

    // Check if user already exists
    let users = getUsers();
    const existing = users.find(u => u.email.toLowerCase() === email.toLowerCase());
    if (existing) {
      msgBox.textContent = "This email is already registered. Please login.";
      return;
    }

    // Save new user
    users.push({ email, password }); // NOTE: plain password – only for demo!
    saveUsers(users);

    msgBox.className = "success";
    msgBox.textContent = "Account created successfully! Redirecting to dashboard...";

    // Mark logged in & redirect
    setLoggedIn(email);
    setTimeout(() => {
      window.location.href = DASHBOARD_PATH;
    }, 800);
  }

  // ===== LOGIN =====
  function handleLogin(event) {
    event.preventDefault();

    const email    = document.getElementById("liEmail").value.trim();
    const password = document.getElementById("liPassword").value.trim();
    const msgBox   = document.getElementById("loginMsg");

    msgBox.className = "error";
    msgBox.textContent = "";

    if (!email || !password) {
      msgBox.textContent = "Please enter email and password.";
      return;
    }

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
    if (!emailPattern.test(email)) {
      msgBox.textContent = "Enter a valid email address.";
      return;
    }

    const users = getUsers();
    const user = users.find(
      u => u.email.toLowerCase() === email.toLowerCase() && u.password === password
    );

    if (!user) {
      msgBox.textContent = "Invalid email or password.";
      return;
    }

    msgBox.className = "success";
    msgBox.textContent = "Login successful! Redirecting to dashboard...";

    setLoggedIn(email);
    setTimeout(() => {
      window.location.href = DASHBOARD_PATH;
    }, 700);
  }

  // ===== SCROLL HELPERS =====
  function scrollToLogin() {
    document.getElementById("liEmail").focus();
  }

  function scrollToSignup() {
    document.getElementById("suEmail").focus();
  }
</script>

</body>
</html>
